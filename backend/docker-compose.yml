services:
  postgres:
    image: postgres:16-alpine
    container_name: mathgame-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: mathgame
      POSTGRES_PASSWORD: mathgame
      POSTGRES_DB: mathgame
    volumes:
      - mathgame_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mathgame-redis
    ports:
      - "6380:6379"

volumes:
  mathgame_pgdata:
